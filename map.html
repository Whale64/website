<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Gallery</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }
        .pixel-font {
            font-family: "Press Start 2P", cursive;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
        .image-container {
            position: relative;
            overflow: hidden;
            border-radius: 0.75rem;
            background: #e2e8f0;
            min-height: 300px;
        }
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen py-8 px-4 md:py-12">

    <div class="max-w-3xl mx-auto">
        <!-- Header Section -->
        <header class="text-center mb-10">
            <h1 class="pixel-font text-2xl md:text-4xl text-blue-600 mb-4 tracking-tighter">MAPS</h1>
        </header>

        <!-- Controls -->
        <div class="flex justify-center mb-8">
            <div class="relative w-full max-w-xs">
                <select id="dropdown" class="block w-full px-4 py-3 text-base text-slate-700 bg-white border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent appearance-none cursor-pointer shadow-sm transition-all hover:border-blue-300">
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>
        </div>

        <!-- Content Card -->
        <main class="glass-card rounded-2xl p-6 md:p-8 transition-all duration-300 transform">
            <div id="image-wrapper" class="image-container mb-6 flex items-center justify-center">
                <div id="spinner" class="loading-spinner absolute z-10"></div>
                <img id="image" 
                     class="w-full h-auto object-cover opacity-0 transition-opacity duration-500" 
                     alt="Map Preview"
                     onerror="this.src='https://placehold.co/600x400?text=Map+Preview+Coming+Soon'">
            </div>

            <div class="space-y-4">
                <div class="flex items-center gap-2">
                    <span class="px-3 py-1 bg-blue-100 text-blue-700 text-xs font-bold rounded-full uppercase tracking-wider" id="badge">Grade Level</span>
                </div>
                <p id="text" class="text-slate-600 leading-relaxed text-lg italic">
                    Loading content...
                </p>
            </div>
        </main>

        <footer class="mt-12 text-center text-slate-400 text-sm">

        </footer>
    </div>

    <script>
        const data = {
            Grade7: {
                title: "Grade 7 Map",
                text: "People in this map: Leo T, Elliott, Charlie S, Atticus J, Casper F, Caleb R, Riel NS, Wyatt M, Miles B, Me (Will H), Finley B, Wyatt J, Doug M, Hank S, Henrik, Tzur N, Johnny H. This map is still being worked on. This is a preview of the current state.",
                img: "https://assets.whale64.net/image.jpg"
            },
            Grade6: {
                title: "Grade 6 Map",
                text: "People in this map: Nico W, Casper F, James C, Hank S, Elliot M, Leo T, Jackson S, Me (Will H), Miles B, Tzur N, Colton R. This map is complete and fully rendered.",
                img: "https://assets.whale64.net/Grade.png"
            }
        };

        const dropdown = document.getElementById("dropdown");
        const text = document.getElementById("text");
        const image = document.getElementById("image");
        const spinner = document.getElementById("spinner");
        const badge = document.getElementById("badge");

        // Populate dropdown
        for (let key in data) {
            const option = document.createElement("option");
            option.value = key;
            option.textContent = key.replace(/([A-Z])/g, ' $1').trim(); // Add space (e.g. Grade 7)
            dropdown.appendChild(option);
        }

        function updateDisplay(value) {
            const current = data[value];
            
            // Reset image visibility for transition
            image.classList.remove('opacity-100');
            image.classList.add('opacity-0');
            spinner.style.display = 'block';
            
            // Update Text
            text.textContent = current.text;
            badge.textContent = value;
            
            // Update Image
            image.src = current.img;
            
            // Smoothly show image when loaded
            image.onload = () => {
                image.classList.remove('opacity-0');
                image.classList.add('opacity-100');
                spinner.style.display = 'none';
            };
        }

        dropdown.addEventListener("change", () => {
            updateDisplay(dropdown.value);
        });

        // Initial Load
        window.onload = () => {
            updateDisplay(dropdown.value);
        };
    </script>
</body>
</html>
